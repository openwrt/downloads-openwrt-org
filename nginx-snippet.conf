location / {
        root /home/mirror/generated;
        index index.main.html index.html;

        # Serve generated files (HTML, JSON) from the overlay directory,
        # fall back to the download data directory for actual files.
        try_files $uri $uri/index.main.html $uri/index.html @data;

        location ~ ^/\.(style\.css|logo\.svg|search\.js)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
        }
}

location @data {
        root /home/mirror/downloads;
}

location ~ ^/(.*/(config\.seed|sha256sums|sha256sums\.gpg|sha256sums\.asc|sha256sums\.sig|Packages|Packages\.gpg|Packages\.manifest|Packages\.sig|.+\.buildinfo))$ {
        root /home/mirror/downloads;
        default_type text/plain;
}
