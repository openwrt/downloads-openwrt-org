name: Deploy to GitHub Pages

on:
  push:
    branches: [staging]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate pages
        run: ./test.sh
        env:
          BASE_URL: /downloads-openwrt-org

      - name: Merge data and generated trees for static hosting
        run: |
          mkdir -p docs/site
          cp -a docs/data/. docs/site/
          cp -a docs/generated/. docs/site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
